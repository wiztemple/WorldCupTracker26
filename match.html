      "Ivory Coast":"🇨🇮",Ecuador:"🇪🇨",Netherlands:"🇳🇱",Japan:"🇯🇵",
      Sweden:"🇸🇪",Tunisia:"🇹🇳",Belgium:"🇧🇪",Egypt:"🇪🇬",Iran:"🇮🇷",
      "New Zealand":"🇳🇿",Spain:"🇪🇸","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦",
      Uruguay:"🇺🇾",France:"🇫🇷",Senegal:"🇸🇳",Norway:"🇳🇴",Argentina:"🇦🇷",
      Algeria:"🇩🇿",Austria:"🇦🇹",Jordan:"🇯🇴",Portugal:"🇵🇹",Colombia:"🇨🇴",
      Uzbekistan:"🇺🇿",England:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",Croatia:"🇭🇷",Ghana:"🇬🇭",
      Panama:"🇵🇦","Congo DR":"🇨🇩",Iraq:"🇮🇶","Türkiye":"🇹🇷"
    };
    const ff = t => FL[t] || "🏳️";

    const SQ_COLORS = {"Mexico":"#006847","South Africa":"#007A4D","South Korea":"#003580","Czech Republic":"#D7141A","Canada":"#CC0000","Bosnia-Herzegovina":"#002395","Switzerland":"#D52B1E","Qatar":"#8D153A","Brazil":"#009639","Morocco":"#C1272D","Haiti":"#003F8A","Scotland":"#005EB8","USA":"#002868","Paraguay":"#D52B1E","Australia":"#00843D","Türkiye":"#E30A17","Germany":"#2a2a2a","Ivory Coast":"#F77F00","Ecuador":"#C8A900","Netherlands":"#EF6C00","Japan":"#BC002D","Sweden":"#006AA7","Tunisia":"#E70013","Belgium":"#C8102E","Egypt":"#C8102E","Iran":"#239F40","New Zealand":"#1a1a1a","Spain":"#AA151B","Cape Verde":"#003893","Saudi Arabia":"#006C35","Uruguay":"#5EB6E4","France":"#002395","Senegal":"#00853F","Iraq":"#007A3D","Norway":"#EF2B2D","Argentina":"#74ACDF","Algeria":"#006233","Austria":"#ED2939","Jordan":"#007A3D","Portugal":"#006600","Congo DR":"#007FFF","Uzbekistan":"#1EB53A","Colombia":"#C8A900","England":"#012169","Croatia":"#CC0000","Ghana":"#006B3F","Panama":"#003F87","Curaçao":"#002B7F"};

    // ── Load data ──────────────────────────────────────────────────────────────
    let DB = {};
    try { DB = JSON.parse(document.getElementById('match-data').textContent); } catch(e) {}


    function parseFixDateTime(fix) {
      const months = { Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12 };
      const m = fix.ld.match(/(?:\w+\s+)?(\d+)\s+(\w+)(?:\s+(\d{2}:\d{2}))?/);
      if (!m) return { date:'', time:'' };
      const day = m[1].padStart(2,'0');
      const mon = String(months[m[2]]||6).padStart(2,'0');
      return { date:`${day}/${mon}/2026`, time: m[3]||fix.ko||'' };
    }
    function getGroupRound(fix) {
      if (fix.g.length !== 1) return null;
      const gm = FX.filter(f => f.g === fix.g && f.g.length === 1).sort((a,b) => a.id.localeCompare(b.id));
      const idx = gm.findIndex(f => f.id === fix.id);
      return idx >= 0 ? idx + 1 : 1;
    }
    function formatGoalMinute(min) {
      if (min > 90) return "90' +" + (min - 90);
      if (min > 45 && min <= 50) return "45' +" + (min - 45);
      return min + "'";
    }
    function groupGoalsByTeam(goals, team) {
      const map = {};
      goals.filter(g => g.team === team).forEach(g => {
        const key = g.player || '?';
        if (!map[key]) map[key] = { player: key, entries: [] };
        map[key].entries.push({ minute: g.minute || 0, assist: (g.assist || '').trim(), type: g.type || 'Open Play' });
      });
      return Object.values(map).map(g => {
        const entries = g.entries.sort((a,b) => b.minute - a.minute);
        const minuteStr = entries.map(e => {
          let s = formatGoalMinute(e.minute);
          if (e.type === 'Own Goal') s += ' (OG)';
          else if (e.type === 'Penalty') s += ' (Pen.)';
          return s;
        }).join(', ');
        const assistStr = entries.map(e => e.assist).filter(Boolean).join(', ');
        return { ...g, minuteStr, assistStr, sortMin: Math.max(...entries.map(e => e.minute)) };
      }).sort((a,b) => b.sortMin - a.sortMin);
    }
    function buildScorersHTML(fix, m) {
      const goals = m.goals || [];
      if (!goals.length) return '';
      const home = groupGoalsByTeam(goals, fix.home);
      const away = groupGoalsByTeam(goals, fix.away);
      const row = g => `<div class="md-scorer"><span class="md-scorer-name">${g.player}</span> <span class="md-scorer-min">${g.minuteStr}</span>${g.assistStr ? `<div class="md-scorer-ast">ast. ${g.assistStr}</div>` : ''}</div>`;
      return `<div class="md-scorers"><div class="md-scorers-home">${home.map(row).join('')||'&nbsp;'}</div><div class="md-scorers-icon">⚽</div><div class="md-scorers-away">${away.map(row).join('')||'&nbsp;'}</div></div>`;
    }
    function buildGroupTable(grp) {
      const gfx = FX.filter(f => f.g === grp && f.g.length === 1);
      const teams = {};
      gfx.forEach(f => { [f.home,f.away].forEach(t => { if (!teams[t]) teams[t] = {name:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; }); });
      gfx.forEach(f => {
        const m = DB[f.id] || { score:{home:null,away:null} };
        if (m.score.home === null || m.score.away === null) return;
        const h = m.score.home, a = m.score.away;
        const ht = teams[f.home], at = teams[f.away];
        ht.p++; at.p++; ht.gf += h; ht.ga += a; at.gf += a; at.ga += h;
        if (h > a) { ht.w++; ht.pts += 3; at.l++; } else if (h < a) { at.w++; at.pts += 3; ht.l++; } else { ht.d++; ht.pts++; at.d++; at.pts++; }
      });
      const rows = Object.values(teams).sort((a,b) => b.pts - a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf - a.gf);
      if (!rows.some(r => r.p > 0)) return '';
      return `<div class="sec"><div class="sl">Group ${grp} Standings</div><div class="std-wrap"><table class="std-table"><thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i) => {
        const gd = r.gf - r.ga;
        return `<tr><td>${i+1}</td><td>${ff(r.name)} ${r.name}</td><td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td>${gd>0?'+'+gd:gd}</td><td>${r.pts}</td></tr>`;
      }).join('')}</tbody></table></div></div>`;
    }
    function buildGroupMatchesList(fix) {
      const gm = FX.filter(f => f.g === fix.g && f.g.length === 1).sort((a,b)=>a.id.localeCompare(b.id));
      return `<div class="md-gm-list">${gm.map(f => {
        const mm = DB[f.id]||{score:{home:null,away:null}};
        const done = mm.score.home !== null && mm.score.away !== null;
        const score = done ? `${mm.score.home}–${mm.score.away}` : 'vs';
        return `<a class="md-gm${fix.id===f.id?' on':''}" href="#${f.id}"><span>${ff(f.home)} ${f.home}</span><span class="md-gm-score">${score}</span><span>${f.away} ${ff(f.away)}</span></a>`;
      }).join('')}</div>`;
    }

    let activeTab = 'details';
    let light = false;

    // ── Position grouping ─────────────────────────────────────────────────────
    function posRank(str) {
      const m = str.match(/^\d+\.\s*([A-Z]+)/i);
      if (!m) return 3;
      const p = m[1].toUpperCase();
      if (p === 'GK') return 0;
      if (['LB','CB','RB','SW','DF','LWB','RWB','WB'].includes(p)) return 1;
      if (['CDM','DM'].includes(p)) return 2;
      if (['CM','MF'].includes(p)) return 3;
      if (['CAM','AM','SS'].includes(p)) return 4;
      if (['LW','RW','FW','ST','CF','SS'].includes(p)) return 5;
      return 3;
    }

    function parsePl(s) {
      const m1 = s.match(/^(\d+)\.\s*([A-Z]+)\s*[-–]\s*(.+)$/i);
      if (m1) return { n: m1[1], pos: m1[2].toUpperCase(), nm: m1[3] };
      const m2 = s.match(/^(\d+)\.\s*(.+)$/);
      if (m2) return { n: m2[1], pos: '', nm: m2[2] };
      return { n: '', pos: '', nm: s };
    }

    function groupByLine(lineup) {
      const ranks = lineup.map(p => ({ raw: p, rank: posRank(p) }));
      const uniqueRanks = [...new Set(ranks.map(r => r.rank))].sort((a,b) => a-b);
      return uniqueRanks.map(r => ranks.filter(p => p.rank === r).map(p => p.raw));
    }

    // ── Pitch renderer ────────────────────────────────────────────────────────
    function renderPitch(fix, m) {
      const hl = m.home_lineup || [];
      const al = m.away_lineup || [];
      if (!hl.length && !al.length) return '';

      const homeColor = SQ_COLORS[fix.home] || '#1a3a5c';
      const awayColor = SQ_COLORS[fix.away] || '#8b1a1a';

      const homeGroups = groupByLine(hl); // GK → FWD
      const awayGroups = groupByLine(al).reverse(); // FWD → GK (reversed for display)

      function playerToken(p, color) {
        const { n, nm } = parsePl(p);
        return `<div class="player-token">
          <div class="player-circle" style="background:${color}">${n}</div>
          <div class="player-token-name">${nm}</div>
        </div>`;
      }

      const homeRows = homeGroups.map(grp =>
        `<div class="pitch-row">${grp.map(p => playerToken(p, homeColor)).join('')}</div>`
      ).join('');

      const awayRows = awayGroups.map(grp =>
        `<div class="pitch-row">${grp.map(p => playerToken(p, awayColor)).join('')}</div>`
      ).join('');

      return `
        <div>
          <div class="pitch-wrap">
            <svg class="pitch-svg" viewBox="0 0 320 520" xmlns="http://www.w3.org/2000/svg">
              <!-- Grass base -->
              <rect width="320" height="520" fill="#1e6b2e" rx="8"/>
              <!-- Alternating stripes -->
              <rect y="0" width="320" height="52" fill="#1a6028" opacity="0.6"/>
              <rect y="104" width="320" height="52" fill="#1a6028" opacity="0.6"/>
              <rect y="208" width="320" height="52" fill="#1a6028" opacity="0.6"/>
              <rect y="312" width="320" height="52" fill="#1a6028" opacity="0.6"/>
              <rect y="416" width="320" height="52" fill="#1a6028" opacity="0.6"/>
              <!-- Boundary -->
              <rect x="16" y="16" width="288" height="488" rx="2" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
              <!-- Center line -->
              <line x1="16" y1="260" x2="304" y2="260" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
              <!-- Center circle -->
              <circle cx="160" cy="260" r="52" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
              <circle cx="160" cy="260" r="3" fill="rgba(255,255,255,0.4)"/>
              <!-- Home penalty area (top) -->
              <rect x="88" y="16" width="144" height="76" rx="1" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
              <!-- Home 6-yard box -->
              <rect x="124" y="16" width="72" height="30" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <!-- Home penalty spot -->
              <circle cx="160" cy="68" r="2" fill="rgba(255,255,255,0.3)"/>
              <!-- Away penalty area (bottom) -->
              <rect x="88" y="428" width="144" height="76" rx="1" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
              <!-- Away 6-yard box -->
              <rect x="124" y="474" width="72" height="30" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <!-- Away penalty spot -->
              <circle cx="160" cy="452" r="2" fill="rgba(255,255,255,0.3)"/>
              <!-- Corner arcs -->
              <path d="M 16 16 Q 24 16 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <path d="M 304 16 Q 296 16 296 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <path d="M 16 504 Q 24 504 24 496" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <path d="M 304 504 Q 296 504 296 496" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
            </svg>

            <div class="pitch-overlay">
              <!-- Home team (top) - GK at top, strikers near center -->
              <div class="pitch-half" style="flex-direction:column">
                ${homeRows}
              </div>
              <!-- Divider -->
              <div class="pitch-divider"></div>
              <!-- Away team (bottom) - strikers near center, GK at bottom -->
              <div class="pitch-half" style="flex-direction:column">
                ${awayRows}
              </div>
            </div>
          </div>

          <div class="pitch-legend">
            <div class="pitch-leg-item">
              <div class="pitch-leg-dot" style="background:${homeColor}"></div>
              <span>${ff(fix.home)} ${fix.home}${m.home_formation ? ' · ' + m.home_formation : ''}</span>
            </div>
            <div class="pitch-leg-item">
              <div class="pitch-leg-dot" style="background:${awayColor}"></div>
              <span>${ff(fix.away)} ${fix.away}${m.away_formation ? ' · ' + m.away_formation : ''}</span>
            </div>
          </div>
        </div>`;
    }

    // ── Tab content builders ──────────────────────────────────────────────────
    function buildOverview(fix, m) {
      const done = m.score && m.score.home !== null;
      const h = m.score?.home, a = m.score?.away;
      const goals = (m.goals || []).sort((x,y) => (x.minute||0) - (y.minute||0));
      const yellows = (m.yellow_cards || []);
      const reds = (m.red_cards || []);
      const subs = (m.substitutions || []);

      if (!done) return `<div class="no-data"><div class="no-data-icon">⏰</div><div class="no-data-title">Match Not Yet Played</div><p style="color:var(--fg3);font-size:11px;margin-top:6px">${fix.ld} 2026 · ${fix.venue||'Venue TBD'}</p></div>`;

      const statSummary = (m.stats?.shots_home != null) ? `
        <div class="ov-stat-grid" style="margin-bottom:20px">
          <div class="ov-stat"><div class="ov-stat-val" style="color:var(--gold)">${m.stats.shots_home}</div><div class="ov-stat-lbl">Home Shots</div></div>
          <div class="ov-stat"><div class="ov-stat-val" style="color:var(--blue)">${m.stats.shots_away}</div><div class="ov-stat-lbl">Away Shots</div></div>
          <div class="ov-stat"><div class="ov-stat-val" style="color:var(--gold)">${m.stats.possession_home}%</div><div class="ov-stat-lbl">Home Poss.</div></div>
          <div class="ov-stat"><div class="ov-stat-val" style="color:var(--blue)">${m.stats.possession_away}%</div><div class="ov-stat-lbl">Away Poss.</div></div>
        </div>` : '';

      const goalsHTML = '';

      const metaHTML = `<div class="md-meta-grid">
        ${fix.venue || fix.city ? `<div class="md-meta-row"><strong>Venue</strong> — ${fix.venue||''}${fix.city ? ', ' + fix.city : ''}</div>` : ''}
        ${m.referee ? `<div class="md-meta-row"><strong>Referee</strong> — ${m.referee}</div>` : ''}
        ${m.attendance ? `<div class="md-meta-row"><strong>Attendance</strong> — ${Number(m.attendance).toLocaleString()}</div>` : ''}
        ${m.home_formation || m.away_formation ? `<div class="md-meta-row"><strong>Formations</strong> — ${m.home_formation||'?'} vs ${m.away_formation||'?'}</div>` : ''}
      </div>`;

      const discHTML = (yellows.length || reds.length) ? (() => {
        const all = [...yellows.map(c=>({...c,t:'y'})), ...reds.map(c=>({...c,t:'r'}))].sort((a,b)=>(a.minute||0)-(b.minute||0));
        return `<div class="sec"><div class="sl">🟨 Discipline</div><div class="el">
          ${all.map(c => {
            const ih = c.team === fix.home;
            return `<div class="ei"><span class="em">${c.minute != null ? c.minute + "'" : "—"}</span><span class="ei-i">${c.t==='y'?'🟨':'🟥'}</span><div style="flex:1"><span class="ep">${c.player||'?'}</span>${c.reason?` <span class="ed">— ${c.reason}</span>`:''}</div><span class="ete ${ih?'eh':'ea'}">${c.team}</span></div>`;
          }).join('')}
        </div></div>`;
      })() : '';

      const subsHTML = subs.length ? `
        <div class="sec"><div class="sl">↕ Substitutions</div><div class="el">
          ${subs.sort((a,b)=>(a.minute||0)-(b.minute||0)).map(s => {
            const ih = s.team === fix.home;
            return `<div class="ei"><span class="em">${s.minute}'</span><span class="ei-i">↕</span><div style="flex:1"><span style="color:var(--g)">↑ ${s.player_in||'?'}</span> <span class="ed">/ <span style="color:var(--r)">↓ ${s.player_out||'?'}</span></span></div><span class="ete ${ih?'eh':'ea'}">${s.team}</span></div>`;
          }).join('')}
        </div></div>` : '';

      const notesHTML = m.notes?.trim() ? `<div class="sec"><div class="sl">📝 Match Report</div><div class="notes-box">${m.notes.trim()}</div></div>` : '';

      return metaHTML + statSummary + goalsHTML + discHTML + subsHTML + notesHTML;
    }

    function buildLineups(fix, m) {
      const hl = m.home_lineup || [], al = m.away_lineup || [];
      const hSubs = m.home_subs || [], aSubs = m.away_subs || [];
      if (!hl.length && !al.length) return `<div class="no-data"><div class="no-data-icon">👥</div><div class="no-data-title">Lineups Not Yet Available</div></div>`;

      const col = (team, players, form) => {
        const parsed = players.map(parsePl);
        return `<div class="lineup-col">
          <div class="lineup-col-head"><span>${ff(team)} ${team}</span>${form?`<span class="lineup-form">${form}</span>`:''}</div>
          ${parsed.map(p => `<div class="lineup-player"><span class="lineup-num">${p.n}</span>${p.pos?`<span class="lineup-pos">${p.pos}</span>`:''}<span class="lineup-name">${p.nm}</span></div>`).join('')}
        </div>`;
      };

      const pitchHTML = renderPitch(fix, m);
      const lineupsHTML = `<div class="sec"><div class="sl">👥 Starting XI</div>
        <div class="lineup-grid">
          ${hl.length ? col(fix.home, hl, m.home_formation) : ''}
          ${al.length ? col(fix.away, al, m.away_formation) : ''}
        </div>
      </div>`;

      const subsSection = (hSubs.length || aSubs.length) ? `
        <div class="sec"><div class="sl">🔄 Substitutes</div>
          <div class="subs-section">
            <div class="subs-head">Available Substitutes</div>
            <div class="subs-body">
              <div class="subs-col">
                <div class="subs-col-head">${ff(fix.home)} ${fix.home}</div>
                ${hSubs.map(s => { const p = parsePl(s); return `<div class="sub-item">${p.n}. ${p.pos ? p.pos + ' — ' : ''}${p.nm}</div>`; }).join('')}
              </div>
              <div class="subs-col">
                <div class="subs-col-head">${ff(fix.away)} ${fix.away}</div>
                ${aSubs.map(s => { const p = parsePl(s); return `<div class="sub-item">${p.n}. ${p.pos ? p.pos + ' — ' : ''}${p.nm}</div>`; }).join('')}
              </div>
            </div>
          </div>
        </div>` : '';

      return `<div class="pitch-section">
        <div>${pitchHTML}</div>
        <div>${lineupsHTML}${subsSection}</div>
      </div>`;
    }

    function buildStats(fix, m) {
      const st = m.stats || {};
      const rows = [
        ['Shots', 'shots_home', 'shots_away'],
        ['Shots on Target', 'shots_on_target_home', 'shots_on_target_away'],
        ['Shots off Target', 'shots_off_target_home', 'shots_off_target_away'],
        ['Blocked Shots', 'blocked_shots_home', 'blocked_shots_away'],
        ['Corners', 'corners_home', 'corners_away'],
        ['Fouls', 'fouls_home', 'fouls_away'],
        ['Offsides', 'offsides_home', 'offsides_away'],
        ['Throw-ins', 'throw_ins_home', 'throw_ins_away'],
        ['Crosses', 'crosses_home', 'crosses_away'],
        ['Counter Attacks', 'counter_attacks_home', 'counter_attacks_away'],
        ['Saves', 'saves_home', 'saves_away'],
        ['Goal Kicks', 'goal_kicks_home', 'goal_kicks_away'],
        ['Passes', 'passes_home', 'passes_away'],
      ];
      const hasData = rows.some(([,h]) => st[h] !== null && st[h] !== undefined);
      if (!hasData && st.possession_home === null) return `<div class="no-data"><div class="no-data-icon">📊</div><div class="no-data-title">Statistics Not Yet Available</div></div>`;

      const possHTML = st.possession_home !== null ? `
        <div class="sec"><div class="sl">⚽ Possession</div>
          <div class="poss-row">
            <div class="poss-side poss-home">
              <div class="poss-pct">${st.possession_home}%</div>
              <div class="poss-lbl">${ff(fix.home)} ${fix.home}</div>
            </div>
            <div class="poss-bar-wrap">
              <div class="poss-bar">
                <div class="poss-bar-h" style="width:${st.possession_home}%"></div>
                <div class="poss-bar-a" style="width:${st.possession_away}%"></div>
              </div>
              <div class="poss-bar-lbl"><span>Home</span><span>Away</span></div>
            </div>
            <div class="poss-side poss-away">
              <div class="poss-pct">${st.possession_away}%</div>
              <div class="poss-lbl">${ff(fix.away)} ${fix.away}</div>
            </div>
          </div>
        </div>` : '';

      const statsHTML = hasData ? `
        <div class="sec"><div class="sl">📊 Match Statistics</div>
          <div class="stats-header">
            <div class="h" style="color:var(--gold)">${ff(fix.home)} ${fix.home}</div>
            <div></div>
            <div class="a" style="color:var(--blue)">${fix.away} ${ff(fix.away)}</div>
          </div>
          ${rows.map(([lbl,h,a]) => {
            const hv = st[h], av = st[a];
            if (hv === null || hv === undefined) return '';
            const tot = (+hv||0) + (+av||0);
            const hp = tot > 0 ? Math.round((+hv/tot)*100) : 50;
            const ap = 100 - hp;
            return `<div class="stat-row">
              <div class="stat-nums">
                <span class="hv" style="color:var(--gold)">${hv}</span>
                <span class="stat-lbl">${lbl}</span>
                <span class="av" style="color:var(--blue)">${av !== null && av !== undefined ? av : '–'}</span>
              </div>
              <div class="stat-bars">
                <div class="bw"><div class="bf-h" style="width:${hp}%"></div></div>
                <div class="bw"><div class="bf-a" style="width:${ap}%"></div></div>
              </div>
            </div>`;
          }).join('')}
        </div>` : '';

      return possHTML + statsHTML;
    }

    function buildTimeline(fix, m) {
      const goals = (m.goals||[]).map(g=>({...g,type_ev:'goal',sort:g.minute||0}));
      const yellows = (m.yellow_cards||[]).map(c=>({...c,type_ev:'yellow',sort:c.minute||0}));
      const reds = (m.red_cards||[]).map(c=>({...c,type_ev:'red',sort:c.minute||0}));
      const subs = (m.substitutions||[]).map(s=>({...s,type_ev:'sub',sort:s.minute||0}));
      const all = [...goals,...yellows,...reds,...subs].sort((a,b)=>a.sort-b.sort);

      if (!all.length) return `<div class="no-data"><div class="no-data-icon">⏱</div><div class="no-data-title">No Events Recorded Yet</div></div>`;

      let html = '<div class="timeline">';
      let htShown = false;

      all.forEach(ev => {
        if (!htShown && ev.sort > 45) {
          htShown = true;
          html += `<div class="tl-halftime">
            <div class="tl-ht-line"></div>
            <div class="tl-ht-label">Half Time</div>
            <div class="tl-ht-line"></div>
          </div>`;
        }
        const isHome = ev.team === fix.home;
        const cls = isHome ? 'home' : 'away';

        if (ev.type_ev === 'goal') {
          const tp = ev.type && ev.type !== 'Open Play' ? ` (${ev.type})` : '';
          const ast = ev.assist ? `Assist: ${ev.assist}` : '';
          html += `<div class="tl-event">
            <div class="tl-min">${ev.minute}'</div>
            <div class="tl-dot goal"></div>
            <div class="tl-card">
              <div class="tl-card-top"><span class="tl-icon">⚽</span><span class="tl-player">${ev.player||'?'}${tp}</span><span class="tl-team ${cls}">${ev.team}</span></div>
              ${ast?`<div class="tl-detail">${ast}</div>`:''}
            </div>
          </div>`;
        } else if (ev.type_ev === 'yellow') {
          html += `<div class="tl-event">
            <div class="tl-min">${ev.minute}'</div>
            <div class="tl-dot yellow"></div>
            <div class="tl-card">
              <div class="tl-card-top"><span class="tl-icon">🟨</span><span class="tl-player">${ev.player||'?'}</span><span class="tl-team ${cls}">${ev.team}</span></div>
              ${ev.reason?`<div class="tl-detail">${ev.reason}</div>`:''}
            </div>
          </div>`;
        } else if (ev.type_ev === 'red') {
          html += `<div class="tl-event">
            <div class="tl-min">${ev.minute}'</div>
            <div class="tl-dot red"></div>
            <div class="tl-card">
              <div class="tl-card-top"><span class="tl-icon">🟥</span><span class="tl-player">${ev.player||'?'}</span><span class="tl-team ${cls}">${ev.team}</span></div>
              ${ev.reason?`<div class="tl-detail">${ev.reason}</div>`:''}
            </div>
          </div>`;
        } else if (ev.type_ev === 'sub') {
          html += `<div class="tl-event">
            <div class="tl-min">${ev.minute}'</div>
            <div class="tl-dot sub"></div>
            <div class="tl-card">
              <div class="tl-card-top"><span class="tl-icon">↕</span><span class="tl-player">Substitution</span><span class="tl-team ${cls}">${ev.team}</span></div>
              <div class="tl-detail"><span style="color:var(--g)">↑ ${ev.player_in||'?'}</span> / <span style="color:var(--r)">↓ ${ev.player_out||'?'}</span></div>
            </div>
          </div>`;
        }
      });

      html += `<div class="tl-halftime" style="margin-top:4px">
        <div class="tl-ht-line"></div>
        <div class="tl-ht-label">Full Time</div>
        <div class="tl-ht-line"></div>
      </div>`;

      html += '</div>';
      return html;
    }

    // ── Main render ───────────────────────────────────────────────────────────
    function render() {
      const hash = window.location.hash.replace('#', '') || 'A1';
      const fix = FX.find(f => f.id === hash);
      const m = DB[hash] || { score: { home: null, away: null } };
      const app = document.getElementById('app');

      if (!fix) {
        app.innerHTML = `<div class="not-found">
          <div style="font-size:48px">🔍</div>
          <div style="font-size:18px;font-weight:700;color:var(--fg2)">Match Not Found</div>
          <div style="color:var(--fg3);font-size:11px">No fixture found for "${hash}"</div>
          <button class="back-btn" onclick="window.location.href='index.html'" style="margin-top:12px">← Back to Tracker</button>
        </div>`;
        return;
      }

      const done = m.score && m.score.home !== null && m.score.away !== null && m.status !== 'live';
      const live = m.status === 'live';
      const hasScore = m.score && m.score.home !== null && m.score.away !== null;
      const h = m.score?.home, a = m.score?.away;
      const v = fix.venue, c = fix.city;

      const hWin = done && h > a, aWin = done && a > h, draw = done && h === a;

      document.title = `${fix.home} vs ${fix.away} — FIFA World Cup 2026`;

      const dt = parseFixDateTime(fix);
      const round = getGroupRound(fix);
      const crumb = fix.g.length === 1 ? `World ▸ FIFA World Cup, Group ${fix.g}, Round ${round}` : `World ▸ FIFA World Cup 2026`;
      const scoreText = hasScore ? `${h} - ${a}` : 'vs';
      const status = live ? 'Live' : done ? 'Finished' : 'Scheduled';
      const tabs = [['details','Details'],['lineups','Lineups'],['statistics','Statistics'],['commentary','Commentary'],['standings','Standings'],['matches','Matches']];

      let tabContent = '';
      if (activeTab === 'details') tabContent = buildOverview(fix, m);
      else if (activeTab === 'lineups') tabContent = buildLineups(fix, m);
      else if (activeTab === 'statistics') tabContent = buildStats(fix, m);
      else if (activeTab === 'commentary') tabContent = buildTimeline(fix, m);
      else if (activeTab === 'standings') tabContent = buildGroupTable(fix.g) || '<div class="md-meta-row">No standings available yet.</div>';
      else if (activeTab === 'matches') tabContent = buildGroupMatchesList(fix);

      app.innerHTML = `
        <div class="md-card">
          <div class="md-head">
            <div class="md-crumb">${crumb}</div>
            <a class="md-close" href="index.html" aria-label="Close">×</a>
          </div>
          <div class="md-datetime"><div class="md-date-pill">${dt.date}${dt.time ? ' • ' + dt.time : ''}</div></div>
          <div class="md-board">
            <div class="md-teams">
              <div class="md-team"><div class="md-team-row"><span class="md-star">☆</span><div class="md-flag">${ff(fix.home)}</div></div><div class="md-tname">${fix.home}</div></div>
              <div class="md-scorebox"><div class="md-score">${scoreText}</div><div class="md-status">${status}</div></div>
              <div class="md-team"><div class="md-team-row"><div class="md-flag">${ff(fix.away)}</div><span class="md-star">☆</span></div><div class="md-tname">${fix.away}</div></div>
            </div>
          </div>
          ${hasScore ? buildScorersHTML(fix, m) : ''}
          <div class="md-tabs">${tabs.map(([k,lbl]) => `<button class="md-tab${activeTab===k?' on':''}" onclick="switchTab('${k}')">${lbl}</button>`).join('')}</div>
          <div class="md-tab-body">${tabContent}</div>
        </div>
      `;
    }

    function switchTab(tab) {
      activeTab = tab;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('btn-theme').addEventListener('click', function() {
      light = !light;
      document.body.toggleAttribute('data-light', light);
      this.textContent = light ? '🌙' : '☀️';
    });

    window.addEventListener('hashchange', () => { activeTab = 'details'; render(); });
    render();
  </script>
</body>
</html>

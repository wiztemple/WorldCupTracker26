    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d0f12;
        --bg2: #14171d;
        --bg3: #1a1e26;
        --bg4: #20252f;
        --fg: #e2e8f0;
        --fg2: #5e6a7d;
        --fg3: #2a3040;
        --fg4: #10131a;
        --bd: #1e232e;
        --bd2: #272e3c;
        --gold: #d4a017;
        --goldf: #0d0f12;
        --g: #16a34a;
        --y: #ca8a04;
        --r: #dc2626;
        --blue: #3b82f6;
      }
      [data-light] {
        --bg: #f4f0e8;
        --bg2: #ece8df;
        --bg3: #e4e0d7;
        --bg4: #dcd7cd;
        --fg: #1a1a1a;
        --fg2: #777;
        --fg3: #c8c3b8;
        --fg4: #e8e3d8;
        --bd: #ddd8ce;
        --bd2: #cac4b9;
        --gold: #9a6f00;
        --goldf: #fff;
        --g: #15803d;
        --y: #92400e;
        --r: #9f1239;
        --blue: #1d4ed8;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 13px;
        min-height: 100vh;
      }
      button {
        cursor: pointer;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 11px;
        font-weight: 700;
        border: none;
        border-radius: 4px;
        transition: all 0.15s;
      }
      button:hover {
        opacity: 0.8;
      }
      .bg {
        background: transparent;
        color: var(--fg2);
        border: 1px solid var(--bd2);
        padding: 4px 10px;
        border-radius: 12px;
      }
      .bg:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(212,160,23,.06);
        opacity: 1;
      }
      .bg.on {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(212,160,23,.12);
      }
      .layout {
        display: grid;
        grid-template-columns: 282px 1fr;
        height: 100vh;
        overflow: hidden;
      }
      .acc-panel {
        display: none;
      }
      .acc-ov-row {
        display: none;
      }
      @media (max-width: 660px) {
        .layout {
          grid-template-columns: 1fr;
          height: auto;
          overflow: auto;
        }
        .mn {
          display: none;
        }
        .acc-panel {
          display: block;
          background: var(--bg);
          border-bottom: 2px solid var(--gold);
          animation: accSlide 0.16s ease;
        }
        @keyframes accSlide {
          from { opacity: 0; transform: translateY(-5px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .acc-ov-row {
          display: flex;
          align-items: center;
          gap: 6px;
          padding: 9px 12px;
          border-bottom: 1px solid var(--bd);
          cursor: pointer;
          background: var(--bg2);
          font-size: 11px;
          font-weight: 700;
          color: var(--gold);
          position: sticky;
          top: 0;
          z-index: 2;
        }
        .acc-ov-row:hover { background: var(--bg3); }
        .acc-ov-row .acc-chevron { margin-left: auto; font-style: normal; }
      }
      .sb {
        border-right: 1px solid var(--bd);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg2);
      }
      .mn {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .sh {
        padding: 16px 15px 13px;
        border-bottom: 2px solid var(--gold);
        flex-shrink: 0;
        background: linear-gradient(160deg, var(--bg2) 0%, var(--bg3) 100%);
        position: relative;
      }
      .sh::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--gold), transparent);
      }
      .st {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 3px;
        color: var(--gold);
        margin-bottom: 4px;
        text-transform: uppercase;
      }
      .sn {
        font-size: 17px;
        font-weight: 800;
        margin-bottom: 3px;
        letter-spacing: -0.3px;
      }
      .ss {
        font-size: 10px;
        color: var(--fg2);
        letter-spacing: 0.3px;
      }
      .gf {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        padding: 7px 9px;
        border-bottom: 1px solid var(--bd);
        flex-shrink: 0;
      }
      .ml {
        overflow-y: auto;
        flex: 1;
      }
      .dh {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--fg3);
        padding: 8px 12px 3px;
        text-transform: uppercase;
        position: sticky;
        top: 0;
        background: var(--bg2);
        z-index: 1;
      }
      .mc {
        padding: 8px 12px;
        border-bottom: 1px solid var(--bd);
        border-left: 3px solid transparent;
        cursor: pointer;
        transition: background 0.12s, border-left-color 0.12s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .mc:hover {
        background: var(--bg3);
        border-left-color: rgba(212, 160, 23, 0.35);
      }
      .mc.on {
        background: var(--bg4);
        border-left-color: var(--gold);
      }
      .mb {
        font-size: 9px;
        font-weight: 700;
        color: var(--gold);
        background: rgba(212, 160, 23, 0.1);
        border: 1px solid rgba(212, 160, 23, 0.18);
        padding: 1px 5px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .mt {
        flex: 1;
        min-width: 0;
      }
      .mn2 {
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mm {
        font-size: 9px;
        color: var(--fg2);
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ms {
        font-size: 13px;
        font-weight: 700;
        text-align: center;
        min-width: 36px;
        flex-shrink: 0;
        color: var(--gold);
      }
      .ms.ns {
        color: var(--fg3);
        font-size: 10px;
        font-weight: 400;
      }
      .pd {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dd {
        background: var(--g);
      }
      .dp {
        background: var(--y);
      }
      .dn {
        background: var(--fg4);
      }
      .tb {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 18px;
        border-bottom: 1px solid var(--bd);
        flex-shrink: 0;
        background: var(--bg2);
      }
      .tt {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--fg2);
        opacity: 0.7;
      }
      .tr {
        margin-left: auto;
        display: flex;
        gap: 6px;
      }
      .de {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        color: var(--fg3);
        padding: 40px;
        text-align: center;
      }
      .dw {
        padding: 22px 26px;
        width: 100%;
        box-sizing: border-box;
      }
      .dg {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--gold);
        margin-bottom: 5px;
      }

        margin-bottom: 8px;

      .sq-card-right { flex:1; background:rgba(0,0,0,.18); padding:18px 16px 16px; display:flex; flex-direction:column; }

        { id: "M100", g: "KO", ld: "Sun 12 Jul 02:00", home: "W95", away: "W96", venue: "", city: "" },
        { id: "M101", g: "KO", ld: "Tue 14 Jul 20:00", home: "W97", away: "W98", venue: "", city: "" },
        { id: "M102", g: "KO", ld: "Wed 15 Jul 20:00", home: "W99", away: "W100", venue: "", city: "" },

        { id: "M104", g: "KO", ld: "Sun 19 Jul 20:00", home: "W101", away: "W102", venue: "", city: "" }
      ];

      const FL = {
        Mexico: "🇲🇽",
        "South Korea": "🇰🇷",

        USA: "🇺🇸",

        Australia: "🇦🇺",

        "Czech Republic": "🇨🇿",
        Iraq: "🇮🇶",
        "Congo DR": "🇨🇩",
      };
      const ff = (t) => FL[t] || "🏳️";

      // ── load JSON from embedded script tag ───────────────────────────────────
      let DB = {};
      try {
        DB = JSON.parse(document.getElementById("match-data").textContent);
      } catch (e) {
        alert("JSON parse error: " + e.message);
      }
      const getM = (id) => DB[id] || { score: { home: null, away: null } };
      const isDone = (id) => {
        const m = getM(id);
        if (m.status === "live") return false;
        if (m.status === "finished") return true;
        return m.score && m.score.home !== null && m.score.away !== null;
      };
      const isLive = (id) => getM(id).status === "live";
      const isPart = (id) => {
        if (isDone(id)) return false;
        const m = getM(id);
        return !!(
          m.referee ||
          (m.goals && m.goals.length) ||
          (m.home_lineup && m.home_lineup.length) ||
          (m.notes && m.notes.trim())
        );
      };

      let currentView = "matches",
        filter = "ALL",
        active = null,
        light = false,
        ovCollapsed = false,
        matchTab = "details";

      // ── routing ──────────────────────────────────────────────────────────────
      function syncHash() {
        let h = `#${currentView}`;
        if (active) h += `/${encodeURIComponent(active)}`;
        if (window.location.hash !== h) {
          window.history.replaceState(null, "", h);
        }
      }
      function readHash() {
        const h = window.location.hash.substring(1);
        if (!h) return;
        const pts = h.split("/");
        if (pts[0]) currentView = pts[0];
        if (pts[1]) active = decodeURIComponent(pts[1]);
        else active = null;
      }
      window.addEventListener("hashchange", () => {
        readHash();
        renderSidebar();
        renderDetail();
      });

      // ── sidebar ──────────────────────────────────────────────────────────────
      function renderSidebar() {
        document.getElementById("vt-matches").className = "vt" + (currentView === "matches" ? " on" : "");
        document.getElementById("vt-squads").className = "vt" + (currentView === "squads" ? " on" : "");
        document.getElementById("vt-bracket").className = "vt" + (currentView === "bracket" ? " on" : "");
        
        let headerTitle = "Match Records";
        if (currentView === "squads") headerTitle = "Squad Rosters";
        else if (currentView === "bracket") headerTitle = "Knockout Bracket";
        document.getElementById("view-title").getContext ="view-title";
        document.getElementById("view-title").textContent = headerTitle;
        
        const groups = [
          "ALL",
          "A",
          "B",
          "C",
          "D",
          "E",
          "F",
          "G",
          "H",
          "I",
          "J",
          "K",
          "L",
        ];
        document.getElementById("gf").innerHTML = groups
          .map(
            (g) =>
              `<button class="bg${filter === g ? " on" : ""}" data-g="${g}">${g}</button>`,
          )
          .join("");
          
        if (currentView === "matches") {
          const fx = filter === "ALL" ? FX : FX.filter((f) => f.g === filter);
        const byDate = {};
        fx.forEach((f) => {
          (byDate[f.ld] = byDate[f.ld] || []).push(f);
        });
        const doneCount = FX.filter((f) => isDone(f.id)).length;
        document.getElementById("prog").textContent =
          `${doneCount} / 72 matches recorded`;
        const isMobile = window.innerWidth <= 660;
        const ovOpen = isMobile && active === null && !ovCollapsed;
        const overviewRow = isMobile
          ? `<div class="acc-ov-row" id="acc-ov-trigger">⚽ Tournament Overview<span class="acc-chevron">${ovOpen ? "▲" : "▼"}</span></div>
             ${ovOpen ? `<div class="acc-panel" data-for="overview">${buildDashboardHTML()}</div>` : ""}`
          : "";

        document.getElementById("ml").innerHTML = overviewRow + Object.keys(byDate)
          .map(
            (d) => `
    <div class="dh">${d}</div>
    ${byDate[d]
      .map((f) => {
        const m = getM(f.id),
          done = isDone(f.id),
          part = isPart(f.id);
        const v = m.venue || f.venue || "",
          c = m.city || f.city || "";
        return `<div class="mc${active === f.id ? " on" : ""}" data-id="${f.id}">
        <div class="pd ${done ? "dd" : part ? "dp" : "dn"}"></div>
        <span class="mb">${f.id}</span>
        <div class="mt">
          <div class="mn2">${ff(f.home)} ${f.home} <span style="color:var(--fg3)">vs</span> ${f.away} ${ff(f.away)}</div>
          <div class="mm">${v ? v + (c ? ", " + c : "") : c || "Venue TBD"}</div>
        </div>
        <div class="ms${done ? "" : " ns"}">${done ? m.score.home + "–" + m.score.away : "–"}</div>
      </div>
      ${isMobile && active === f.id ? `<div class="acc-panel" data-for="${f.id}">${buildDetailHTML(f.id)}</div>` : ""}`;
      })
      .join("")}`,
          )
          .join("");
        } else if (currentView === "squads") {
          // Squads view
          const tByG = {};
          FX.forEach(f => {
            if (!tByG[f.g]) tByG[f.g] = new Set();
            tByG[f.g].add(f.home);
            tByG[f.g].add(f.away);
          });
          
          let grps = Object.keys(tByG).sort();
          if (filter !== "ALL") grps = grps.filter(g => g === filter);
          
          let sqHtml = "";
          grps.forEach(g => {
            sqHtml += `<div class="sq-group-label">Group ${g}</div>`;
            const tms = Array.from(tByG[g]).sort();
            tms.forEach(t => {
              sqHtml += `<div class="sq-team${active === t ? " on" : ""}" data-team="${t}">
                <div class="sq-team-flag">${ff(t)}</div>
                <div class="sq-team-name">${t}</div>
                <div class="sq-team-group">GRP ${g}</div>
              </div>`;
            });
          });
          document.getElementById("ml").innerHTML = sqHtml;
        } else if (currentView === "bracket") {
          document.getElementById("ml").innerHTML = `<div style="padding:16px;color:var(--fg3);font-size:11px;text-align:center;line-height:1.6">Select any match directly from the bracket representation to view live scores and details.</div>`;
        }
        
        syncHash();
      }

      // ── dashboard ─────────────────────────────────────────────────────────────
      function buildBracketMatch(id) {
        const fix = FX.find(f => f.id === id);
        if (!fix) return `<div class="br-match" style="visibility:hidden"></div>`;
        const m = getM(id);
        const done = isDone(id);
        const hm = done ? m.score.home : "-";
        const aw = done ? m.score.away : "-";
        const homeName = m.home || fix.home;
        const awayName = m.away || fix.away;
        
        return `<div class="br-match" onclick="active='${id}'; renderDetail();" title="${homeName} vs ${awayName}">
          <div class="br-meta"><span>${id}</span> <span>${fix.ld.split(" ").slice(1).join(" ")}</span></div>
          <div class="br-team ${done && hm > aw ? 'winner' : ''}"><div class="br-flag">${ff(homeName)}</div><div class="br-name">${homeName}</div><div class="br-score">${hm}</div></div>
          <div class="br-team ${done && aw > hm ? 'winner' : ''}"><div class="br-flag">${ff(awayName)}</div><div class="br-name">${awayName}</div><div class="br-score">${aw}</div></div>
        </div>`;
      }

      function buildBracketHTML() {
        const cols = [
          { title: "Round of 32", matches: ["M74","M77","M73","M75","M83","M84","M81","M82"] },
          { title: "Round of 16", matches: ["M89","M90","M93","M94"] },
          { title: "Quarter-final", matches: ["M97","M98"] },
          { title: "Semi-final", matches: ["M101"] },
          { title: "Final", matches: ["M104","M103"] },
          { title: "Semi-final", matches: ["M102"] },
          { title: "Quarter-final", matches: ["M99","M100"] },
          { title: "Round of 16", matches: ["M91","M92","M95","M96"] },
          { title: "Round of 32", matches: ["M76","M78","M79","M80","M86","M88","M85","M87"] }
        ];
        
        let html = `<div class="bracket-view">`;
        cols.forEach((col, cIdx) => {
          html += `<div class="br-col">`;
          html += `<div class="br-label" style="opacity:${cIdx === 4 ? 0 : 1}">${col.title}</div>`; // Hide label for center, we inject it manually
          html += `<div style="display:flex;flex-direction:column;justify-content:space-around;height:100%;gap:12px;">`;
          col.matches.forEach(mId => {
            if (cIdx === 4 && mId === "M104") html += `<div class="br-label" style="color:var(--gold);font-size:12px;margin:0 0 -10px 0;">Final</div>`;
            if (cIdx === 4 && mId === "M103") html += `<div class="br-label" style="color:var(--fg3);font-size:10px;margin:40px 0 -10px 0;">Play-off for third place</div>`;
            html += buildBracketMatch(mId);
          });
          html += `</div></div>`;
        });
        html += `</div>`;
        return html;
      }

      function buildGroupTable(grp) {
        const gfx = FX.filter(f => f.g === grp && f.g.length === 1);
        const teams = {};
        gfx.forEach(f => {
          [f.home, f.away].forEach(t => {
            if (!teams[t]) teams[t] = {name:t, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0};
          });
        });
        gfx.forEach(f => {
          const m = getM(f.id);
          if (!isDone(f.id)) return;
          const h = m.score.home, a = m.score.away;
          const ht = teams[f.home], at = teams[f.away];
          ht.p++; at.p++;
          ht.gf += h; ht.ga += a;
          at.gf += a; at.ga += h;
          if (h > a)      { ht.w++; ht.pts += 3; at.l++; }
          else if (h < a) { at.w++; at.pts += 3; ht.l++; }
          else            { ht.d++; ht.pts++; at.d++; at.pts++; }
        });
        const rows = Object.values(teams).sort((a,b) =>
          b.pts - a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf - a.gf || a.name.localeCompare(b.name)
        );
        if (!rows.some(r => r.p > 0)) return '';
        return `<div class="sec"><div class="sl">📊 Group ${grp} Standings</div>
          <div class="std-wrap"><table class="std-table">
            <thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
            <tbody>${rows.map((r,i) => {
              const gd = r.gf - r.ga;
              const gdStr = gd > 0 ? `<span class="std-gd-pos">+${gd}</span>` : gd < 0 ? `<span class="std-gd-neg">${gd}</span>` : '0';
              return `<tr class="${i < 2 ? 'std-q' : ''}">
                <td class="std-pos">${i+1}</td>
                <td><span style="margin-right:6px">${ff(r.name)}</span>${r.name}</td>
                <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
                <td>${r.gf}</td><td>${r.ga}</td><td>${gdStr}</td>
                <td class="std-pts">${r.pts}</td>
              </tr>`;
            }).join('')}</tbody>
          </table></div>
        </div>`;
      }

      function buildAllGroupTablesHTML() {
        const played = ['A','B','C','D','E','F','G','H','I','J','K','L']
          .map(g => buildGroupTable(g)).filter(Boolean);
        if (!played.length) return '';
        return `<div class="sec"><div class="sl">📊 Group Standings</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-top:8px">
            ${played.map(t => `<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:6px;overflow:hidden;padding:0 0 4px">${t.replace('<div class="sec">','<div>').replace('<div class="sl">','<div style="padding:8px 12px;font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--gold);border-bottom:1px solid var(--bd)">').replace('</div>\n          <div class="std-wrap">','</div><div class="std-wrap" style="padding:0 4px">')}</div>`).join('')}
          </div>
        </div>`;
      }

      function buildDashboardHTML() {
        const allGoals = [], allYellows = [], allReds = [];
        const scorers = {}, assisters = {};
        let playedCount = 0;

        FX.forEach((fix, idx) => {
          const m = getM(fix.id);
          const done = isDone(fix.id);
          if (done) playedCount++;
          if (!done && !isPart(fix.id)) return;
          (m.goals || []).forEach((g) => {
            allGoals.push({ ...g, _idx: idx, _id: fix.id, _home: fix.home, _away: fix.away, _ld: fix.ld });
            if (g.type !== "Own Goal" && g.player) {
              const k = g.player + "|" + g.team;
              if (!scorers[k]) scorers[k] = { player: g.player, team: g.team, goals: 0 };
              scorers[k].goals++;
            }
            if (g.assist && g.assist.trim() && g.type !== "Own Goal") {
              const k = g.assist + "|" + g.team;
              if (!assisters[k]) assisters[k] = { player: g.assist, team: g.team, assists: 0 };
              assisters[k].assists++;
            }
          });
          (m.yellow_cards || []).forEach((y) => {
            allYellows.push({ ...y, _idx: idx, _id: fix.id, _home: fix.home, _away: fix.away, _ld: fix.ld });
          });
          (m.red_cards || []).forEach((r) => {
            allReds.push({ ...r, _idx: idx, _id: fix.id, _home: fix.home, _away: fix.away, _ld: fix.ld });
          });
        });

        const byTime = (a, b) => a._idx !== b._idx ? a._idx - b._idx : (a.minute || 0) - (b.minute || 0);
        allGoals.sort(byTime); allYellows.sort(byTime); allReds.sort(byTime);

        const cdHTML = `<div class="cd-wrap">
          <div class="cd-title">World Cup Kicks Off In</div>
          <div class="cd-timer">
            <div class="cd-box"><div class="cd-val" id="cd-d">--</div><div class="cd-lbl">Days</div></div>
            <div class="cd-box"><div class="cd-val" id="cd-h">--</div><div class="cd-lbl">Hours</div></div>
            <div class="cd-box"><div class="cd-val" id="cd-m">--</div><div class="cd-lbl">Mins</div></div>
            <div class="cd-box"><div class="cd-val" id="cd-s">--</div><div class="cd-lbl">Secs</div></div>
          </div>
        </div>`;

        if (!playedCount && !allGoals.length) {
          return cdHTML + `<div class="de"><div style="font-size:34px">⚽</div><div style="font-weight:700;color:var(--fg2)">FIFA World Cup 2026</div><div style="font-size:11px;color:var(--fg3);line-height:1.9">Tournament begins <span style="color:var(--gold)">11 June 2026</span><br>Select a match from the sidebar to view details.</div></div>`;
        }

        const topScorers = Object.values(scorers).sort((a, b) => b.goals - a.goals).slice(0, 10);
        const topAssists = Object.values(assisters).sort((a, b) => b.assists - a.assists).slice(0, 10);
        const firstOwnGoal = allGoals.find((g) => g.type === "Own Goal");

        const statBox = (label, val, col) =>
          `<div style="background:var(--bg3);border:1px solid var(--bd2);border-radius:5px;padding:12px 8px;text-align:center">
            <div style="font-size:26px;font-weight:700;color:${col}">${val}</div>
            <div style="font-size:9px;letter-spacing:1px;color:var(--fg2);font-weight:700;margin-top:3px">${label}</div>
          </div>`;

        const matchDesc = (ev) => {
          const f = FX.find((x) => x.id === ev._id);
          return f ? `${f.home} vs ${f.away} · ${ev._ld}` : ev._id;
        };

        const firstCard = (icon, label, ev) => {
          if (!ev) return "";
          return `<div class="sec"><div class="sl">${icon} ${label}</div>
            <div class="ei">
              <span class="em">${ev.minute}'</span>
              <span class="ei-i">${icon}</span>
              <div style="flex:1">
                <span class="ep">${ev.player || "?"}</span>
                ${ev.type && ev.type !== "Open Play" ? ` <span style="color:var(--fg2)">(${ev.type})</span>` : ""}
                ${ev.assist ? ` <span style="font-size:10px;color:var(--fg2)">ast. ${ev.assist}</span>` : ""}
                ${ev.reason ? ` <span style="font-size:10px;color:var(--fg2)">— ${ev.reason}</span>` : ""}
                <div style="font-size:10px;color:var(--fg3);margin-top:2px">${matchDesc(ev)}</div>
              </div>
              <span style="font-size:10px;color:var(--fg2);font-weight:700">${ev.team}</span>
            </div>
          </div>`;
        };

        const scorersSection = topScorers.length
          ? `<div class="sec"><div class="sl">⚽ Top Scorers</div><div class="el">
              ${topScorers.map((s, i) =>
                `<div class="ei">
                  <span style="font-size:11px;font-weight:700;color:var(--fg2);min-width:18px;text-align:right">${i + 1}</span>
                  <div style="flex:1"><span class="ep">${s.player}</span> <span style="font-size:10px;color:var(--fg2)">${ff(s.team)} ${s.team}</span></div>
                  <span style="font-weight:700;color:var(--gold);font-size:18px">${s.goals}</span>
                </div>`).join("")}
            </div></div>`
          : "";

        const assistsSection = topAssists.length
          ? `<div class="sec"><div class="sl">🅰️ Top Assists</div><div class="el">
              ${topAssists.map((s, i) =>
                `<div class="ei">
                  <span style="font-size:11px;font-weight:700;color:var(--fg2);min-width:18px;text-align:right">${i + 1}</span>
                  <div style="flex:1"><span class="ep">${s.player}</span> <span style="font-size:10px;color:var(--fg2)">${ff(s.team)} ${s.team}</span></div>
                  <span style="font-weight:700;color:var(--blue);font-size:18px">${s.assists}</span>
                </div>`).join("")}
            </div></div>`
          : "";
          
        let topClubsSection = "";
        if (window.SQUADS) {
          const clubCounts = {};
          Object.values(window.SQUADS).forEach(squad => {
            squad.forEach(player => {
              if (player.c) {
                clubCounts[player.c] = (clubCounts[player.c] || 0) + 1;
              }
            });
          });
          
          const topClubs = Object.entries(clubCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 10);
            
          if (topClubs.length) {
            topClubsSection = `<div class="sec"><div class="sl">🏟 Top Clubs Represented</div><div class="el">
              ${topClubs.map((c, i) =>
                `<div class="ei" style="cursor:pointer;transition:background .12s,border-left-color .12s;border-left:3px solid transparent;" onclick='showClubPlayers(${JSON.stringify(c[0])})'
                  onmouseenter="this.style.background='var(--bg4)';this.style.borderLeftColor='var(--gold)'"
                  onmouseleave="this.style.background='';this.style.borderLeftColor='transparent'">
                  <span style="font-size:11px;font-weight:700;color:var(--fg2);min-width:18px;text-align:right">${i + 1}</span>
                  <div style="flex:1"><span class="ep">${c[0]}</span></div>
                  <span style="font-weight:700;color:var(--gold);font-size:18px">${c[1]} <span style="font-size:10px;color:var(--fg2);font-weight:400">players</span></span>
                </div>`).join("")}
            </div></div>`;
          }
        }

        const groupsGridHTML = buildAllGroupTablesHTML();

        return cdHTML + `<div class="dw">
          <div class="dg">FIFA WORLD CUP 2026 · TOURNAMENT OVERVIEW</div>

      // ── detail ────────────────────────────────────────────────────────────────

      function parseFixDateTime(fix) {
        const months = { Jan: 1, Feb: 2, Mar: 3, Apr: 4, May: 5, Jun: 6, Jul: 7, Aug: 8, Sep: 9, Oct: 10, Nov: 11, Dec: 12 };
        const m = fix.ld.match(/(?:\w+\s+)?(\d+)\s+(\w+)(?:\s+(\d{2}:\d{2}))?/);
        if (!m) return { date: "", time: "" };
        const day = m[1].padStart(2, "0");
        const mon = String(months[m[2]] || 6).padStart(2, "0");
        return { date: `${day}/${mon}/2026`, time: m[3] || fix.ko || "" };
      }

      function getGroupRound(fix) {
        if (fix.g.length !== 1) return null;
        const gm = FX.filter((f) => f.g === fix.g && f.g.length === 1).sort((a, b) => a.id.localeCompare(b.id));
        const idx = gm.findIndex((f) => f.id === fix.id);
        return idx >= 0 ? idx + 1 : 1;
      }

      function formatGoalMinute(min) {
        if (min > 90) return "90' +" + (min - 90);
        if (min > 45 && min <= 50) return "45' +" + (min - 45);
        return min + "'";
      }

      function groupGoalsByTeam(goals, team) {
        const map = {};
        goals.filter((g) => g.team === team).forEach((g) => {
          const key = g.player || "?";
          if (!map[key]) map[key] = { player: key, entries: [] };
          map[key].entries.push({
            minute: g.minute || 0,
            assist: (g.assist || "").trim(),
            type: g.type || "Open Play",
          });
        });
        return Object.values(map)
          .map((g) => {
            const entries = g.entries.sort((a, b) => b.minute - a.minute);
            const minuteStr = entries
              .map((e) => {
                let s = formatGoalMinute(e.minute);
                if (e.type === "Own Goal") s += " (OG)";
                else if (e.type === "Penalty") s += " (Pen.)";
                return s;
              })
              .join(", ");
            const assistStr = entries.map((e) => e.assist).filter(Boolean).join(", ");
            return { ...g, minuteStr, assistStr, sortMin: Math.max(...entries.map((e) => e.minute)) };
          })
          .sort((a, b) => b.sortMin - a.sortMin);
      }

      function buildScorersHTML(fix, m) {
        const goals = m.goals || [];
        if (!goals.length) return "";
        const home = groupGoalsByTeam(goals, fix.home);
        const away = groupGoalsByTeam(goals, fix.away);
        const row = (g) =>
          `<div class="md-scorer"><span class="md-scorer-name">${g.player}</span> <span class="md-scorer-min">${g.minuteStr}</span>${g.assistStr ? `<div class="md-scorer-ast">ast. ${g.assistStr}</div>` : ""}</div>`;
        return `<div class="md-scorers">
          <div class="md-scorers-home">${home.map(row).join("") || "&nbsp;"}</div>
          <div class="md-scorers-icon">⚽</div>
          <div class="md-scorers-away">${away.map(row).join("") || "&nbsp;"}</div>
        </div>`;
      }

      function buildMatchTabBody(fix, m, tab) {
        const v = m.venue || fix.venue || "", c = m.city || fix.city || "";
        if (tab === "lineups") return rLineups(fix, m);
        if (tab === "statistics") return rStats(fix, m) || `<div class="md-meta-row">No statistics recorded yet.</div>`;
        if (tab === "commentary") return buildCommentary(fix, m);
        if (tab === "standings") return buildGroupTable(fix.g) || `<div class="md-meta-row">No standings available yet.</div>`;
        if (tab === "matches") return buildGroupMatchesList(fix);
        return `<div class="md-meta-grid">
          ${v || c ? `<div class="md-meta-row"><strong>Venue</strong> — ${v}${c ? ", " + c : ""}</div>` : ""}
          ${m.referee ? `<div class="md-meta-row"><strong>Referee</strong> — ${m.referee}</div>` : ""}

        </div>${rDisc(fix, m)}${rSubs(fix, m)}${rNotes(m)}`;
      }

      function buildCommentary(fix, m) {
        const goals = (m.goals || []).map((g) => ({ ...g, kind: "goal", sort: g.minute || 0 }));
        const cards = [...(m.yellow_cards || []).map((c) => ({ ...c, kind: "yellow", sort: c.minute || 0 })), ...(m.red_cards || []).map((c) => ({ ...c, kind: "red", sort: c.minute || 0 }))];
        const subs = (m.substitutions || []).map((s) => ({ ...s, kind: "sub", sort: s.minute || 0 }));
        const all = [...goals, ...cards, ...subs].sort((a, b) => a.sort - b.sort);
        if (!all.length) return `<div class="md-meta-row">No commentary events yet.</div>`;
        return `<div class="sec"><div class="sl">Commentary</div><div class="el">${all
          .map((ev) => {
            const ih = ev.team === fix.home;
            if (ev.kind === "goal") {
              const tp = ev.type && ev.type !== "Open Play" ? ` (${ev.type})` : "";
              const ast = ev.assist ? ` — ast. ${ev.assist}` : "";
              return `<div class="ei"><span class="em">${formatGoalMinute(ev.sort)}</span><span class="ei-i">⚽</span><div style="flex:1"><span class="ep">${ev.player || "?"}${tp}${ast}</span></div><span class="ete ${ih ? "eh" : "ea"}">${ev.team}</span></div>`;
            }
            if (ev.kind === "sub") {
              return `<div class="ei"><span class="em">${ev.sort}'</span><span class="ei-i">↕</span><div style="flex:1"><span style="color:var(--g)">↑ ${ev.player_in || "?"}</span> <span class="ed">/ ↓ ${ev.player_out || "?"}</span></div><span class="ete ${ih ? "eh" : "ea"}">${ev.team}</span></div>`;
            }
            return `<div class="ei"><span class="em">${ev.sort != null ? ev.sort + "'" : "—"}</span><span class="ei-i">${ev.kind === "yellow" ? "🟨" : "🟥"}</span><div style="flex:1"><span class="ep">${ev.player || "?"}</span>${ev.reason ? ` <span class="ed">— ${ev.reason}</span>` : ""}</div><span class="ete ${ih ? "eh" : "ea"}">${ev.team}</span></div>`;
          })
          .join("")}</div></div>`;
      }

      function buildGroupMatchesList(fix) {

        const rPos = (lbl, code, arr) => {
          if (!arr.length) return "";
          return `<div class="pos-section">
            <div class="pos-label"><span class="pos-icon ${code.toLowerCase()}"></span> ${lbl}</div>
            <div class="player-grid">
              ${arr.map(p => `
                <div class="player-card">
                  <div class="player-num">${p.n || "-"}</div>
                  <div class="player-details">
                    <div class="player-name">${p.nm} ${p.cap ? '<span class="captain-badge">C</span>' : ''}</div>
                    <div class="player-club">${p.c || "Unattached"}</div>
                  </div>
                  <div class="player-pos-badge ${code.toLowerCase()}">${code}</div>
                </div>
              `).join("")}
            </div>
          </div>`;
        };

        const rCoach = coach ? `
          <div class="pos-section">
            <div class="pos-label"><span class="pos-icon mgr"></span> Head Coach</div>
            <div class="player-grid">
              <div class="player-card">
                <div class="player-num">👔</div>
                <div class="player-details">
                  <div class="player-name">${coach}</div>
                  <div class="player-club">Manager</div>
                </div>
                <div class="player-pos-badge mgr">MGR</div>
              </div>
            </div>
          </div>
        ` : "";

        const statsBar = sq.length ? `
          <div class="squad-stats-bar">
            <div class="squad-stat-box"><div class="val" style="color:var(--gold)">${sq.length}</div><div class="lbl">PLAYERS</div></div>
            <div class="squad-stat-box"><div class="val" style="color:var(--fg)">${cap ? cap.nm : "TBD"}</div><div class="lbl">CAPTAIN</div></div>
            <div class="squad-stat-box"><div class="val" style="color:var(--blue)">${dfs.length}</div><div class="lbl">DEFENDERS</div></div>
            <div class="squad-stat-box"><div class="val" style="color:var(--g)">${mfs.length}</div><div class="lbl">MIDFIELDERS</div></div>
          </div>
        ` : `<div class="nb">The player roster for ${team} has not been announced yet.</div>`;
        
        const rosterToggle = `<div class="sq-view-toggle">
          <button class="sq-vt-btn${squadMode==='roster'?' on':''}" onclick="toggleSquadMode('roster')">Roster</button>
          <button class="sq-vt-btn${squadMode==='card'?' on':''}" onclick="toggleSquadMode('card')">Card</button>
        </div>`;

        if (squadMode === 'card') {
          const color = SQ_COLORS[team]||'#1a3a5c';
          const sceneColor = SCENE_PAGE_COLORS[team] || color;
          const lightBgTeams = new Set(['Argentina', 'England']);
          const noStripeTeams = new Set(['Argentina', 'England', 'France']);
          return `<div class="sq-scene${lightBgTeams.has(team)?' sq-scene-dark':''}" style="background:${sceneColor}">
            ${noStripeTeams.has(team) ? '' : '<div class="sq-scene-bg"></div>'}
            ${SCENE_BG[team] || DEFAULT_SCENE_BG}
            <div class="sq-scene-hdr">
              <div class="sq-scene-team">
                <span class="sq-scene-flag">${ff(team)}</span>
                <div>
                  <div class="sq-scene-nm">${team}</div>
                  <div class="sq-scene-meta">${sq.length?'26-Man Roster':'Squad Info'} · FIFA World Cup 2026${coach?` · ${coach}`:''}</div>
                </div>
              </div>
              <div class="sq-view-toggle">
                <button class="sq-vt-btn sq-vt-light${squadMode==='roster'?' on':''}" onclick="toggleSquadMode('roster')">Roster</button>
                <button class="sq-vt-btn sq-vt-light${squadMode==='card'?' on':''}" onclick="toggleSquadMode('card')">Card</button>
              </div>
            </div>
            ${buildSquadCardHTML(team)}
          </div>`;
        }

        return `<div class="dw">
          <div class="squad-header">
            <div class="squad-flag">${ff(team)}</div>
            <div class="squad-info">
              <h2>${team}</h2>
              <div class="squad-meta">${sq.length ? '26-Man Roster' : 'Squad Info'} · FIFA World Cup 2026${coach ? ` · Head Coach: ${coach}` : ''}</div>
            </div>
            ${rosterToggle}
          </div>
          ${statsBar}
          ${rCoach}
          ${rPos('Goalkeepers', 'GK', gks)}
          ${rPos('Defenders', 'DF', dfs)}
          ${rPos('Midfielders', 'MF', mfs)}
          ${rPos('Forwards', 'FW', fws)}
        </div>`;
      }

      function renderDetail() {
        syncHash();
        const el = document.getElementById("detail");
        if (!active) { renderDashboard(); return; }
        
        if (currentView === "matches") {
          el.innerHTML = buildDetailHTML(active);
        } else {
          el.innerHTML = buildSquadDetailHTML(active);
        }
      }

      function rGoals(fix, m) {
        const g = (m.goals || []).sort(
          (a, b) => (a.minute || 0) - (b.minute || 0),
        );
        if (!g.length) return "";
        return `<div class="sec"><div class="sl">⚽ Goals</div><div class="el">${g
          .map((x) => {
            const ih = x.team === fix.home;
            const tp =
              x.type && x.type !== "Open Play"
                ? ` <span style="color:var(--fg2)">(${x.type})</span>`
                : "";
            const ast = x.assist
              ? ` <span style="font-size:10px;color:var(--fg2)">ast. ${x.assist}</span>`
              : "";
            return `<div class="ei"><span class="em">${x.minute}'</span><span class="ei-i">⚽</span><div style="flex:1"><span class="ep">${x.player || "?"}</span>${tp}${ast}</div><span class="ete ${ih ? "eh" : "ea"}">${x.team}</span></div>`;
          })
          .join("")}</div></div>`;
      }
      function rDisc(fix, m) {
        const y = (m.yellow_cards || []).map((c) => ({ ...c, t: "y" }));
        const r = (m.red_cards || []).map((c) => ({ ...c, t: "r" }));
        const all = [...y, ...r].sort(
          (a, b) => (a.minute || 0) - (b.minute || 0),
        );
        if (!all.length) return "";
        return `<div class="sec"><div class="sl">🟨 Discipline</div><div class="el">${all
          .map((c) => {
            const ih = c.team === fix.home;
            return `<div class="ei"><span class="em">${c.minute != null ? c.minute + "'" : "—"}</span><span class="ei-i">${c.t === "y" ? "🟨" : "🟥"}</span><div style="flex:1"><span class="ep">${c.player || "?"}</span>${c.reason ? ` <span class="ed">— ${c.reason}</span>` : ""}</div><span class="ete ${ih ? "eh" : "ea"}">${c.team}</span></div>`;
          })
          .join("")}</div></div>`;
      }
      function rSubs(fix, m) {
        const s = (m.substitutions || []).sort(
          (a, b) => (a.minute || 0) - (b.minute || 0),
        );
        if (!s.length) return "";
        return `<div class="sec"><div class="sl">↕ Substitutions</div><div class="el">${s
          .map((x) => {
            const ih = x.team === fix.home;
            return `<div class="ei"><span class="em">${x.minute}'</span><span class="ei-i">↕</span><div style="flex:1"><span style="color:var(--g)">↑ ${x.player_in || "?"}</span> <span class="ed">/ <span style="color:var(--r)">↓ ${x.player_out || "?"}</span></span></div><span class="ete ${ih ? "eh" : "ea"}">${x.team}</span></div>`;
          })
          .join("")}</div></div>`;
      }
      function rStats(fix, m) {
        const st = m.stats || {};
        const rows = [
          ["Possession", "possession_home", "possession_away"],
          ["Shots", "shots_home", "shots_away"],
          ["Shots on Target", "shots_on_target_home", "shots_on_target_away"],
          ["Shots off Target", "shots_off_target_home", "shots_off_target_away"],
          ["Blocked Shots", "blocked_shots_home", "blocked_shots_away"],
          ["Corners", "corners_home", "corners_away"],
          ["Offsides", "offsides_home", "offsides_away"],
          ["Fouls", "fouls_home", "fouls_away"],
          ["Throw-ins", "throw_ins_home", "throw_ins_away"],
          ["Crosses", "crosses_home", "crosses_away"],
          ["Counter Attacks", "counter_attacks_home", "counter_attacks_away"],
          ["Saves", "saves_home", "saves_away"],
          ["Goal Kicks", "goal_kicks_home", "goal_kicks_away"],
          ["Passes", "passes_home", "passes_away"],
        ];
        const has = rows.some(([, h]) => st[h] !== null && st[h] !== undefined);
        if (!has) return "";
        return `<div class="sec"><div class="sl">📊 Statistics</div>
    <div style="display:grid;grid-template-columns:1fr auto 1fr;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--fg2);margin-bottom:6px;padding:0 2px">
      <span style="text-align:right">${ff(fix.home)} ${fix.home}</span><span></span><span>${fix.away} ${ff(fix.away)}</span>
    </div>
    <div class="sg">${rows
      .map(([lbl, h, a]) => {
        const hv = st[h],
          av = st[a];
        if (hv === null || hv === undefined) return "";
        const tot = (+hv || 0) + (+av || 0),
          hp = tot > 0 ? Math.round((+hv / tot) * 100) : 50;
        return `<div><div class="sr2"><span class="sv h">${hv}</span><span class="sl2">${lbl}</span><span class="sv a">${av !== null && av !== undefined ? av : "–"}</span></div>
        <div class="sb2"><div class="bw"><div class="bf" style="width:${hp}%;float:right"></div></div><div class="bw"><div class="bf" style="width:${100 - hp}%"></div></div></div></div>`;
      })
      .join("")}</div></div>`;
      }
      function rLineups(fix, m) {
        const hl = m.home_lineup || [],
          al = m.away_lineup || [];
        if (!hl.length && !al.length) return "";
        const pp = (s) => {
          const m1 = s.match(/^(\d+)\.\s*([A-Z]{1,3})\s*[-–]\s*(.+)$/);
          if (m1) return { n: m1[1], p: m1[2], nm: m1[3] };
          const m2 = s.match(/^(\d+)\.\s*(.+)$/);
          if (m2) return { n: m2[1], p: "", nm: m2[2] };
          return { n: "", p: "", nm: s };
        };
        const col = (team, flag, form, players, subs) => `<div class="lc">
    <div class="lh"><span>${flag} ${team}</span>${form ? `<span class="lf">${form}</span>` : ""}</div>
    ${players
      .map((p) => {
        const { n, p: pos, nm } = pp(p);
        return `<div class="lp"><span class="ln">${n}</span>${pos ? `<span class="lo">${pos}</span>` : ""}<span class="lx">${nm}</span></div>`;
      })
      .join("")}
    ${
      subs && subs.length
        ? `<div class="ls"><div class="lst">Substitutes</div>${subs
            .map((s) => {
              const { n, p: pos, nm } = pp(s);
              return `<div class="lsi">${n ? n + ". " : ""} ${pos ? pos + " — " : ""} ${nm}</div>`;
            })
            .join("")}</div>`
        : ""
    }</div>`;
        return `<div class="sec"><div class="sl">👥 Lineups</div><div class="lg">
    ${hl.length ? col(fix.home, ff(fix.home), m.home_formation || "", hl, m.home_subs || []) : ""}
    ${al.length ? col(fix.away, ff(fix.away), m.away_formation || "", al, m.away_subs || []) : ""}
  </div></div>`;
      }
      function rNotes(m) {
        if (!m.notes || !m.notes.trim()) return "";
        return `<div class="sec"><div class="sl">📝 Notes</div><div class="nb">${m.notes.trim().replace(/</g, "&lt;")}</div></div>`;
      }

      // ── events ────────────────────────────────────────────────────────────────
      document.addEventListener("click", (e) => {
        // View tabs
        const vt = e.target.closest(".vt");
        if (vt) {
          currentView = vt.dataset.view;
          active = null;
          ovCollapsed = false;
          renderSidebar();
          renderDetail();
          return;
        }

        const gb = e.target.closest("[data-g]");
        if (gb && gb.closest("#gf")) {
          filter = gb.dataset.g;
          active = null;
          ovCollapsed = false;
          renderSidebar();
          renderDetail();
          return;
        }

        // Mobile: Overview row toggle
        if (e.target.closest("#acc-ov-trigger")) {
          if (active !== null) {
            // switch from match view to overview
            active = null;
            ovCollapsed = false;
          } else {
            // toggle overview open/collapsed
            ovCollapsed = !ovCollapsed;
          }
          renderSidebar();
          return;
        }

        if (e.target.closest(".md-close")) {
          active = null;
          renderSidebar();
          renderDetail();
          return;
        }
        const mt = e.target.closest(".md-tab");
        if (mt) {
          matchTab = mt.dataset.tab;
          renderDetail();
          return;
        }
        const mg = e.target.closest(".md-gm");
        if (mg) {
          active = mg.dataset.id;
          matchTab = "details";
          renderSidebar();
          renderDetail();
          return;
        }

        const mc = e.target.closest(".mc");
        if (mc) {
          const id = mc.dataset.id;
          if (window.innerWidth <= 660) {
            active = active === id ? null : id;
            if (active) matchTab = "details";
            ovCollapsed = active !== null;
            renderSidebar();
          } else {
            active = id;
            matchTab = "details";
            renderSidebar();
            renderDetail();
          }
          return;
        }
        
        const sp = e.target.closest(".sq-team");
        if (sp) {
          active = sp.dataset.team;
          squadMode = 'roster';
          renderSidebar();
          renderDetail();
          return;
        }
        if (e.target.id === "btn-theme") {
          light = !light;
          document.body.toggleAttribute("data-light", light);
          e.target.textContent = light ? "🌙" : "☀️";
        }
      });

      readHash();
      renderSidebar();
      renderDetail();

      // Countdown updater
      setInterval(() => {
        const dEl = document.getElementById("cd-d");
        if (!dEl) return; // not currently rendering the dashboard
        const target = new Date("2026-06-11T16:00:00Z").getTime(); // Est. opening match UTC
        const now = new Date().getTime();
        let diff = target - now;
        if (diff < 0) diff = 0;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        dEl.textContent = d.toString().padStart(2, '0');
        document.getElementById("cd-h").textContent = h.toString().padStart(2, '0');
        document.getElementById("cd-m").textContent = m.toString().padStart(2, '0');
        document.getElementById("cd-s").textContent = s.toString().padStart(2, '0');
      }, 1000);

      const POS_ORDER = { GK: 0, DF: 1, MF: 2, FW: 3 };
      const POS_COLORS = { GK: '#e6a817', DF: '#3b82f6', MF: '#22c55e', FW: '#ef4444' };

      function showClubPlayers(club) {
        const players = [];
        Object.entries(window.SQUADS || {}).forEach(([country, squad]) => {
          squad.forEach(p => {
            if (p.c === club) players.push({ ...p, country });
          });
        });
        players.sort((a, b) => (POS_ORDER[a.p] ?? 9) - (POS_ORDER[b.p] ?? 9) || a.n - b.n);

        document.getElementById('club-modal-title').textContent = club;
        document.getElementById('club-modal-body').innerHTML = players.map(p => {
          const col = POS_COLORS[p.p] || 'var(--fg2)';
          const flag = ff(p.country);
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border:1px solid var(--bd);border-left:3px solid ${col};border-radius:4px;">
            <span style="font-size:16px;font-weight:800;color:var(--gold);min-width:24px;text-align:center">${p.n}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.nm}</div>
              <div style="font-size:10px;color:var(--fg2);margin-top:1px">${flag} ${p.country}</div>
            </div>
            <span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;background:${col}1a;color:${col}">${p.p}</span>
          </div>`;
        }).join('');

        document.getElementById('club-modal').style.display = 'flex';
      }

      function closeClubModal() {
        document.getElementById('club-modal').style.display = 'none';
      }

      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeClubModal(); });
    </script>

    <!-- Club players modal -->
    <div id="club-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);align-items:center;justify-content:center;" onclick="if(event.target===this)closeClubModal()">
      <div style="background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;width:520px;max-width:calc(100vw - 32px);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 24px 48px rgba(0,0,0,.5);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);">
          <div>
            <div style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:2px">Club Squad</div>
            <div id="club-modal-title" style="font-size:16px;font-weight:800;"></div>
          </div>
          <button onclick="closeClubModal()" style="background:var(--bg3);border:1px solid var(--bd2);color:var(--fg2);padding:5px 10px;font-size:12px;border-radius:4px;">✕</button>
        </div>
        <div id="club-modal-body" style="overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:5px;"></div>
      </div>
    </div>
  </body>
</html>
